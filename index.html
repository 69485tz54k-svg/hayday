<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hay Day</title>
    <style>
        body { font-family: Arial; background: #667eea; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        h1 { text-align: center; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat { background: #667eea; color: white; padding: 15px; border-radius: 8px; text-align: center; }
        #farmArea { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .farm-plot { border: 2px solid #ddd; padding: 20px; text-align: center; font-size: 2em; cursor: pointer; border-radius: 8px; background: #f5f5f5; }
        .farm-plot.growing { background: #d4fc79; }
        button { padding: 10px; margin: 5px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 Hay Day</h1>
        <div class="stats">
            <div class="stat">💰 <div id="coins">500</div></div>
            <div class="stat">⭐ <div id="level">1</div></div>
        </div>
        <div id="farmArea"></div>
        <button id="buyWheat" onclick="plantCrop('wheat')">🌾 Wheat (50)</button>
        <button id="buyCorn" onclick="plantCrop('corn')">🌽 Corn (75)</button>
        <button id="buyCarrot" onclick="plantCrop('carrot')">🥕 Carrot (100)</button>
        <button id="upgradeFarm" onclick="upgradeFarm()">📈 Upgrade (200)</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
